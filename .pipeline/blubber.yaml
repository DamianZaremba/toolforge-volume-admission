# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v1.8.0
version: v4
base: docker-registry.wikimedia.org/golang1.24
variants:
  download-deps:
    lives:
      in: /src
    builders:
      - custom:
          requirements: [.]
          command:
            - go
            - mod
            - download

  test:
    includes:
      - download-deps
    entrypoint:
      - go
      - test
      - ./...

  build:
    includes:
      - download-deps
    builders:
      - custom:
          command:
            - /bin/bash
            - -c
            - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -a -installsuffix cgo -ldflags="-w -s" -o volume-admission ./main.go

  image:
    lives:
      in: /src
    copies:
      - from: build
        source: /src/volume-admission
        destination: /volume-admission
    entrypoint: [/volume-admission]
